<div class="shell">
  <div class="shell-toolbar">
    <div class="toolbar-brand">
      <mat-icon class="brand-icon">smart_toy</mat-icon>
      <span class="brand-title">AI Assistant</span>
    </div>
    <div class="toolbar-actions">
      <button mat-icon-button (click)="openKnowledgeBase()" matTooltip="Knowledge Base">
        <mat-icon>menu_book</mat-icon>
      </button>
      <button mat-icon-button (click)="openPluginManagement()" matTooltip="Manage Plugins">
        <mat-icon>extension</mat-icon>
      </button>
      <button mat-icon-button (click)="goToAdmin()" matTooltip="Admin">
        <mat-icon>admin_panel_settings</mat-icon>
      </button>
    </div>
  </div>

  <div class="shell-body">
    <chatbot-widget theme="inline"></chatbot-widget>
  </div>
</div>
