<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title-row">
      <mat-icon class="sidebar-icon">forum</mat-icon>
      <h2 class="sidebar-title">Conversations</h2>
    </div>
    <button mat-icon-button (click)="newConversation.emit()" class="new-chat-btn" title="New conversation" matTooltip="New conversation">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <div class="conversation-list">
    <div
      *ngFor="let conv of conversations"
      class="conversation-item"
      [class.active]="conv.id === selectedId"
      (click)="select(conv)"
    >
      <div class="conv-info">
        <ng-container *ngIf="editingId === conv.id; else titleDisplay">
          <input
            #editInput
            class="conv-title-input"
            [value]="editTitle"
            (input)="editTitle = $any($event.target).value"
            (keydown.enter)="saveEdit(conv)"
            (keydown.escape)="cancelEdit($event)"
            (blur)="saveEdit(conv)"
            (click)="$event.stopPropagation()"
          />
        </ng-container>
        <ng-template #titleDisplay>
          <span class="conv-title">{{ conv.title }}</span>
        </ng-template>
        <span class="conv-date">{{ formatDate(conv.updatedAt) }}</span>
      </div>
      <div class="conv-actions">
        <button
          mat-icon-button
          class="edit-btn"
          (click)="startEdit($event, conv)"
          matTooltip="Rename"
        ><mat-icon>edit</mat-icon></button>
        <button
          mat-icon-button
          class="delete-btn"
          (click)="delete($event, conv.id)"
          matTooltip="Delete"
        ><mat-icon>delete</mat-icon></button>
      </div>
    </div>

    <div *ngIf="conversations.length === 0" class="empty-state">
      No conversations yet.<br>Click "+ New" to start.
    </div>
  </div>
</div>
