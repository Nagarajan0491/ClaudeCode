<div class="input-container">
  <div class="input-row">
    <button
      *ngIf="voiceService.sttSupported"
      mat-icon-button
      (click)="toggleRecording()"
      [class.recording]="isListening"
      [disabled]="isLoading"
      class="mic-button"
      matTooltip="{{ isListening ? 'Stop recording' : 'Start voice input' }}"
    >
      <mat-icon>{{ isListening ? 'mic' : 'mic_none' }}</mat-icon>
    </button>
    
    <div class="textarea-wrapper">
      <textarea
        #textArea
        [(ngModel)]="content"
        (keydown)="onKeyDown($event)"
        (input)="onInput()"
        [disabled]="isLoading"
        placeholder="Type your message..."
        rows="1"
        class="message-textarea"
      ></textarea>
    </div>
    
    <button
      mat-icon-button
      (click)="send()"
      [disabled]="!canSend"
      class="send-button"
      [class.can-send]="canSend"
      matTooltip="Send message"
    >
      <mat-icon>{{ isLoading ? 'hourglass_empty' : 'send' }}</mat-icon>
    </button>
  </div>
  
  <div class="input-footer" *ngIf="isListening || charCount > maxLength * 0.8">
    <div class="footer-left">
      <span class="char-count" [class.over-limit]="isOverLimit">
        {{ charCount }}/{{ maxLength }}
      </span>
      <span *ngIf="isListening" class="recording-indicator">
        <span class="recording-dot"></span> Recording...
      </span>
    </div>
  </div>
</div>
