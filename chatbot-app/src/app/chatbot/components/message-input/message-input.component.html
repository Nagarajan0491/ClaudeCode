<div class="input-container">
  <div class="input-row">
    <div class="textarea-wrapper">
      <textarea
        #textArea
        [(ngModel)]="content"
        (keydown)="onKeyDown($event)"
        (input)="onInput()"
        [disabled]="isLoading"
        placeholder="Type your message..."
        rows="1"
        class="message-textarea"
      ></textarea>
    </div>

    <button
      *ngIf="voiceService.sttSupported"
      mat-icon-button
      (click)="toggleRecording()"
      [disabled]="isLoading"
      class="mic-button"
      [class.recording]="isListening"
      matTooltip="{{ isListening ? 'Stop recording' : 'Voice input' }}"
    >
      <mat-icon>{{ isListening ? 'mic' : 'mic_none' }}</mat-icon>
    </button>

    <button
      mat-icon-button
      (click)="send()"
      [disabled]="!canSend"
      class="send-button"
      [class.can-send]="canSend"
      matTooltip="Send message"
    >
      <mat-icon>{{ isLoading ? 'hourglass_empty' : 'send' }}</mat-icon>
    </button>
  </div>

  <div class="input-footer" *ngIf="isListening || charCount > maxLength * 0.8">
    <span *ngIf="isListening" class="recording-indicator">
      <span class="recording-dot"></span> Listening…
    </span>
    <span class="char-count" [class.over-limit]="isOverLimit" *ngIf="charCount > maxLength * 0.8">
      {{ charCount }}/{{ maxLength }}
    </span>
  </div>
</div>
