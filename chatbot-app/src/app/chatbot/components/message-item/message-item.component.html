<div class="message-wrapper" [class.user-message]="isUser" [class.bot-message]="!isUser">
  <div class="avatar">{{ isUser ? '🧑' : '🤖' }}</div>
  <div class="message-content">
    <div class="bubble" [class.user-bubble]="isUser" [class.bot-bubble]="!isUser && !message.isError" [class.error-bubble]="message.isError">
      <p class="message-text" [innerHTML]="message.content"></p>
      <span *ngIf="message.isStreaming" class="streaming-cursor">▍</span>
    </div>
    <div *ngIf="!isUser && !message.isError && !message.isStreaming && voiceService.ttsSupported" class="playback-controls">
      <button
        (click)="playMessage()"
        [disabled]="isPlaying"
        class="ctrl-btn"
        title="Play message"
      >
        <mat-icon>play_arrow</mat-icon>
      </button>
      <button
        (click)="pauseMessage()"
        [disabled]="!isPlaying"
        class="ctrl-btn"
        title="Pause"
      >
        <mat-icon>pause</mat-icon>
      </button>
      <button
        (click)="stopMessage()"
        [disabled]="!isPlaying && !isPaused"
        class="ctrl-btn"
        title="Stop"
      >
        <mat-icon>stop</mat-icon>
      </button>
    </div>
    <span *ngIf="!message.isStreaming" class="timestamp">{{ formattedTime }}</span>
  </div>
</div>
