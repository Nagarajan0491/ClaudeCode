<div class="message-wrapper" [class.user-message]="isUser" [class.bot-message]="!isUser">
  <div class="avatar">{{ isUser ? '🧑' : '🤖' }}</div>
  <div class="message-content">
    <div class="bubble" [class.user-bubble]="isUser" [class.bot-bubble]="!isUser && !message.isError" [class.error-bubble]="message.isError">
      <div class="message-text" [innerHTML]="message.content | markdown"></div>
      <span *ngIf="message.isStreaming" class="streaming-cursor">▍</span>
    </div>
    <div
      *ngIf="!isUser && !message.isError && !message.isStreaming && voiceService.ttsSupported"
      class="playback-controls"
    >
      <button *ngIf="!isPlaying && !isPaused" (click)="playMessage()" matTooltip="Play" class="ctrl-btn">
        <mat-icon>play_arrow</mat-icon>
      </button>
      <button *ngIf="isPlaying" (click)="pauseMessage()" matTooltip="Pause" class="ctrl-btn">
        <mat-icon>pause</mat-icon>
      </button>
      <button *ngIf="isPaused" (click)="playMessage()" matTooltip="Resume" class="ctrl-btn">
        <mat-icon>play_arrow</mat-icon>
      </button>
      <button *ngIf="isPlaying || isPaused" (click)="stopMessage()" matTooltip="Stop" class="ctrl-btn">
        <mat-icon>stop</mat-icon>
      </button>
    </div>
    <span *ngIf="!message.isStreaming" class="timestamp">{{ formattedTime }}</span>
  </div>
</div>
