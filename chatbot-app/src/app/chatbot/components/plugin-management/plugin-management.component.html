<div class="dialog-container">
  <div class="dialog-header">
    <h2>Plugin Management</h2>
    <button mat-icon-button (click)="close()"><mat-icon>close</mat-icon></button>
  </div>

  <div class="dialog-body">
    <div *ngIf="isLoading" class="loading">
      <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
    </div>

    <div *ngIf="!isLoading">
      <div *ngFor="let plugin of plugins" class="plugin-row">
        <div class="plugin-info">
          <span class="plugin-name">{{ plugin.name }}</span>
          <span class="plugin-desc">{{ plugin.description }}</span>
          <span class="plugin-url">{{ plugin.url }}</span>
        </div>
        <div class="plugin-actions">
          <mat-slide-toggle
            [checked]="plugin.isActive"
            (change)="togglePlugin(plugin)"
            matTooltip="Enable/disable"
          ></mat-slide-toggle>
          <button mat-icon-button color="warn" (click)="deletePlugin(plugin.id)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>

      <div *ngIf="plugins.length === 0" class="empty">No plugins registered yet.</div>

      <div *ngIf="showAddForm" class="add-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput [(ngModel)]="newPlugin.name" placeholder="Plugin name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <input matInput [(ngModel)]="newPlugin.description" placeholder="What does this plugin do?" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>URL</mat-label>
          <input matInput [(ngModel)]="newPlugin.url" placeholder="https://..." />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>HTTP Method</mat-label>
          <mat-select [(ngModel)]="newPlugin.httpMethod">
            <mat-option value="GET">GET</mat-option>
            <mat-option value="POST">POST</mat-option>
            <mat-option value="PUT">PUT</mat-option>
          </mat-select>
        </mat-form-field>
        <div class="form-actions">
          <button mat-button (click)="showAddForm = false">Cancel</button>
          <button mat-raised-button color="primary" (click)="addPlugin()" [disabled]="!newPlugin.name || !newPlugin.url">Add</button>
        </div>
      </div>
    </div>
  </div>

  <div class="dialog-footer">
    <button mat-stroked-button (click)="showAddForm = !showAddForm">
      <mat-icon>add</mat-icon> Add Plugin
    </button>
    <button mat-button (click)="close()">Close</button>
  </div>
</div>
