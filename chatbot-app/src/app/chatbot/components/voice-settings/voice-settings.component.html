<div class="voice-settings" *ngIf="voiceService.ttsSupported || voiceService.sttSupported">

  <label class="toggle-row">
    <div class="toggle-info">
      <span class="toggle-label-text">Auto-play responses</span>
      <span class="toggle-desc">Speak AI replies automatically</span>
    </div>
    <div class="pill-toggle" [class.on]="autoPlay" (click)="toggleAutoPlay()">
      <div class="pill-thumb"></div>
    </div>
  </label>

  <div class="setting-row" *ngIf="voiceService.ttsSupported && voices.length > 0">
    <label class="setting-label">Voice</label>
    <select
      class="voice-native-select"
      [value]="selectedVoiceName"
      (change)="onVoiceChange($any($event.target).value)"
    >
      <option value="">Select a voice…</option>
      <option *ngFor="let v of voices" [value]="v.name">{{ v.name }}</option>
    </select>
  </div>

  <div class="setting-row" *ngIf="voiceService.ttsSupported">
    <div class="setting-label-row">
      <label class="setting-label">Speed</label>
      <span class="setting-value">{{ rate }}×</span>
    </div>
    <input
      type="range"
      [value]="rate"
      min="0.5" max="2" step="0.05"
      (input)="onRateChange(+$any($event.target).value)"
      class="voice-slider"
    />
  </div>

  <div class="setting-row" *ngIf="voiceService.ttsSupported">
    <div class="setting-label-row">
      <label class="setting-label">Pitch</label>
      <span class="setting-value">{{ pitch }}</span>
    </div>
    <input
      type="range"
      [value]="pitch"
      min="0.5" max="2" step="0.05"
      (input)="onPitchChange(+$any($event.target).value)"
      class="voice-slider"
    />
  </div>

</div>
